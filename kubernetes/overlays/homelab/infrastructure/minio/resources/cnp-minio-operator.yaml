apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: minio-operator
  namespace: minio-operator
  labels:
    app.kubernetes.io/name: minio-operator
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: operator
  ingress:
    # Health probes from kubelet
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "4221"
              protocol: TCP
    # Webhook calls from kube-apiserver
    - fromEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "4221"
              protocol: TCP
  egress:
    # Kubernetes API for managing tenants
    - toCIDRSet:
        - cidr: 10.96.0.1/32
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    # Tenant pods for lifecycle management
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: minio
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
            - port: "9443"
              protocol: TCP
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
