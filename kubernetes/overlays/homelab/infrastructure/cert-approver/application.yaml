apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubelet-serving-cert-approver
  namespace: argocd
spec:
  project: infrastructure
  sources:
    - repoURL: https://postfinance.github.io/kubelet-serving-cert-approver
      chart: kubelet-serving-cert-approver
      targetRevision: 0.10.3
      helm:
        valueFiles:
          - $values/kubernetes/base/infrastructure/cert-approver/values.yaml
    - repoURL: https://github.com/Nosmoht/Talos-Homelab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
