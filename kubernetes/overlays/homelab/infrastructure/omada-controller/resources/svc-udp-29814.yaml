# Second Service for UDP/29814 (manager-v2 UDP beacon).
#
# The upstream chart's Service defines 29814 only as TCP. Empirically the
# SG3428 v2.30 firmware emits its pre-adoption inform beacon as UDP/29814
# (hubble observe shows "Service backend not found DROPPED (UDP)" for the
# switch source IP -> omada-controller:29814 UDP). Without this Service the
# switch can never register with the Controller and stays invisible.
#
# Shares the same LoadBalancer VIP as the main Service via Cilium's
# lb-ipam-sharing-key so both live on the same announced VIP. Same pod
# selector.
apiVersion: v1
kind: Service
metadata:
  name: omada-controller-udp
  namespace: omada-controller
  labels:
    app.kubernetes.io/name: omada-controller
    app.kubernetes.io/instance: omada-controller
    app.kubernetes.io/component: controller-udp
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
  annotations:
    io.cilium/lb-ipam-sharing-key: omada-controller
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: omada-controller
    app.kubernetes.io/instance: omada-controller
  ports:
    - name: manager-v2-udp
      port: 29814
      targetPort: 29814
      protocol: UDP
