apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: omada-controller
  labels:
    app.kubernetes.io/name: omada-controller
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: lb-pool
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  blocks:
    - start: 192.168.2.11
      stop: 192.168.2.11
  serviceSelector:
    matchLabels:
      app.kubernetes.io/name: omada-controller
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: omada-controller
  labels:
    app.kubernetes.io/name: omada-controller
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: l2-announcement
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  loadBalancerIPs: true
  externalIPs: false
  interfaces:
    - ^enp0s31f6$
    - ^eth0$
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  serviceSelector:
    matchLabels:
      app.kubernetes.io/name: omada-controller
