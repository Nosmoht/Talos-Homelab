apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: homelab-l2
  labels:
    app.kubernetes.io/name: cilium
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: l2-announcement
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  # Announce only the Gateway API LoadBalancer Service, not every LB Service.
  serviceSelector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: homelab-gateway
  # Keep VIP ownership on nodes explicitly designated for edge ingress.
  nodeSelector:
    matchLabels:
      homelab.ntbc.io/edge-gateway: "true"
  loadBalancerIPs: true
