apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generators:
  - ksops-generator-grafana.yaml
  - ksops-generator-oauth2.yaml

configMapGenerator:
  - name: dashboard-prometheus
    namespace: monitoring
    files:
      - dashboards/prometheus.json
    options:
      labels:
        homelab_dashboard: "1"
      disableNameSuffixHash: true

resources:
  - thanos-query.yaml
  - etcd-service.yaml
  - etcd-endpointslice.yaml
  - etcd-servicemonitor.yaml
  - cilium-servicemonitors.yaml
  - prometheus-rules.yaml
  - grafana-httproute.yaml
  - prometheus-httproute.yaml
  - alertmanager-httproute.yaml
  - oauth2-proxy-prometheus.yaml
  - oauth2-proxy-alertmanager.yaml
  - cnp-prometheus.yaml
  - cnp-alertmanager.yaml
  - cnp-grafana.yaml
  - cnp-thanos-query.yaml
  - cnp-oauth2-proxy.yaml
  - cnp-kube-state-metrics.yaml
  - cnp-prometheus-operator.yaml
  - cnp-node-exporter.yaml
