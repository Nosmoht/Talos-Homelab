apiVersion: v1
kind: Service
metadata:
  name: prometheus-oauth2-proxy
  namespace: monitoring
  labels:
    app: prometheus-oauth2-proxy
    app.kubernetes.io/name: prometheus-oauth2-proxy
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: oauth2-proxy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4180
      targetPort: http
  selector:
    app: prometheus-oauth2-proxy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-oauth2-proxy
  namespace: monitoring
  labels:
    app: prometheus-oauth2-proxy
    app.kubernetes.io/name: prometheus-oauth2-proxy
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: oauth2-proxy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prometheus-oauth2-proxy
  template:
    metadata:
      labels:
        app: prometheus-oauth2-proxy
        app.kubernetes.io/name: prometheus-oauth2-proxy
        app.kubernetes.io/instance: homelab
        app.kubernetes.io/component: oauth2-proxy
        app.kubernetes.io/part-of: homelab
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: prometheus-oauth2-proxy
                topologyKey: kubernetes.io/hostname
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.14.2
          args:
            - --http-address=0.0.0.0:4180
            - --provider=oidc
            - --oidc-issuer-url=https://dex.homelab.ntbc.io
            - --redirect-url=https://prometheus.homelab.ntbc.io/oauth2/callback
            - --upstream=http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090
            - --email-domain=*
            - --scope=openid email profile groups
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --cookie-refresh=1h
            - --cookie-expire=12h
            - --skip-provider-button=true
            - --set-xauthrequest=true
            - --pass-access-token=true
            - --pass-authorization-header=true
            - --reverse-proxy=true
          ports:
            - name: http
              containerPort: 4180
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              value: prometheus
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: prometheus-client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-secrets
                  key: prometheus-cookie-secret
          readinessProbe:
            httpGet:
              path: /ping
              port: http
          livenessProbe:
            httpGet:
              path: /ping
              port: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
