apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: kube-prometheus-stack
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  ingress:
    # Thanos Query -> Thanos sidecar gRPC
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: thanos-query
      toPorts:
        - ports:
            - port: "10901"
              protocol: TCP
  egress:
    # Scrape targets in all namespaces
    - toEndpoints:
        - {}
    # cert-manager metrics (cross-namespace)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cert-manager
            app.kubernetes.io/instance: cert-manager
            app.kubernetes.io/component: controller
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cert-manager
            app.kubernetes.io/instance: cert-manager
            app.kubernetes.io/component: cainjector
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cert-manager
            app.kubernetes.io/instance: cert-manager
            app.kubernetes.io/component: webhook
      toPorts:
        - ports:
            - port: "9402"
              protocol: TCP
    # cilium and hubble metrics (cross-namespace)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: cilium
      toPorts:
        - ports:
            - port: "9962"
              protocol: TCP
            - port: "9965"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            io.cilium/app: operator
      toPorts:
        - ports:
            - port: "9963"
              protocol: TCP
    # Scrape targets on node IPs (node-exporter, kubelet)
    - toCIDRSet:
        - cidr: 192.168.2.0/24
    # Kubernetes API for service discovery
    - toCIDRSet:
        - cidr: 10.96.0.1/32
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
    # Alertmanager
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: alertmanager
      toPorts:
        - ports:
            - port: "9093"
              protocol: TCP
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
