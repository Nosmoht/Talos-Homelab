apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: pni-gateway-ingress-identity
  labels:
    app.kubernetes.io/name: platform-network-interface
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  description: >-
    Allow the reserved:ingress identity (Cilium Gateway API proxy) to
    reach cluster workloads and accept traffic from world + cluster.
    Without this, internal pod traffic forwarded through the Gateway
    ClusterIP is denied by the cilium.l7policy filter because the
    reserved:ingress endpoint has no explicit egress/ingress policy.
    See: cilium/cilium#28254, cilium/cilium#43964, cilium/cilium#24536.
  endpointSelector:
    matchLabels:
      "reserved:ingress": ""
  ingress:
    - fromEntities:
        - world
        - cluster
  egress:
    - toEntities:
        - cluster
