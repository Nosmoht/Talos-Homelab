apiVersion: piraeus.io/v1
kind: LinstorCluster
metadata:
  name: homelab
  namespace: piraeus-datastore
spec:
  nodeSelector:
    matchLabels:
      extensions.talos.dev/nvme-cli: v2.14
  apiTLS:
    certManager:
      kind: Issuer
      name: linstor-api-ca
  internalTLS:
    certManager:
      kind: Issuer
      name: linstor-internal-ca
