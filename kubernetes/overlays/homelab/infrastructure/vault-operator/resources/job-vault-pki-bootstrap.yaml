apiVersion: batch/v1
kind: Job
metadata:
  name: vault-pki-bootstrap
  namespace: vault
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
  labels:
    app.kubernetes.io/name: vault-pki-bootstrap
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: bootstrap
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-pki-bootstrap
        app.kubernetes.io/instance: homelab
        app.kubernetes.io/component: bootstrap
        app.kubernetes.io/part-of: homelab
        app.kubernetes.io/managed-by: argocd
    spec:
      restartPolicy: OnFailure
      serviceAccountName: vault-pki-bootstrap
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: copy-vault-ca
          image: alpine/kubectl:1.35.0
          command:
            - /bin/sh
            - -ec
            - |
              kubectl -n cert-manager create secret generic vault-ca \
                --from-file=ca.crt=/vault/tls/ca.crt \
                --dry-run=client -o yaml | kubectl apply -f -
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: vault-tls
              mountPath: /vault/tls
              readOnly: true
      containers:
        - name: bootstrap
          image: hashicorp/vault:1.21.2
          command:
            - /bin/sh
            - -ec
            - |
              export VAULT_ADDR="https://vault.vault.svc.cluster.local:8200"
              export VAULT_CACERT="/vault/tls/ca.crt"
              export VAULT_TOKEN="$(cat /vault/bootstrap/vault-root)"
              export KUBE_CA_PATH="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

              until vault status >/dev/null 2>&1; do
                sleep 5
              done

              if ! vault secrets list -format=json | grep -q '"pki_root/"'; then
                vault secrets enable -path=pki_root pki
              fi
              vault secrets tune -max-lease-ttl=87600h pki_root

              if ! vault read -field=certificate pki_root/cert/ca >/dev/null 2>&1; then
                vault write -field=certificate pki_root/root/generate/internal \
                  common_name="homelab.local Root CA" \
                  ttl=87600h >/tmp/pki-root-ca.crt
              fi

              vault write pki_root/config/urls \
                issuing_certificates="${VAULT_ADDR}/v1/pki_root/ca" \
                crl_distribution_points="${VAULT_ADDR}/v1/pki_root/crl"

              if ! vault secrets list -format=json | grep -q '"pki_int/"'; then
                vault secrets enable -path=pki_int pki
              fi
              vault secrets tune -max-lease-ttl=43800h pki_int

              if ! vault read -field=certificate pki_int/cert/ca >/dev/null 2>&1; then
                vault write -field=csr pki_int/intermediate/generate/internal \
                  common_name="homelab.local Intermediate CA" >/tmp/pki-int.csr
                vault write -field=certificate pki_root/root/sign-intermediate \
                  csr=@/tmp/pki-int.csr \
                  format=pem_bundle \
                  ttl=43800h >/tmp/pki-int.crt
                vault write pki_int/intermediate/set-signed certificate=@/tmp/pki-int.crt
              fi

              vault write pki_int/config/urls \
                issuing_certificates="${VAULT_ADDR}/v1/pki_int/ca" \
                crl_distribution_points="${VAULT_ADDR}/v1/pki_int/crl"

              vault write pki_int/roles/cert-manager-internal \
                allowed_domains="homelab.local" \
                allow_bare_domains=true \
                allow_subdomains=true \
                allow_glob_domains=true \
                allow_any_name=false \
                max_ttl="2160h"

              cat <<'EOF' >/tmp/cert-manager-pki.hcl
              path "pki_int/sign/cert-manager-internal" {
                capabilities = ["update"]
              }
              path "pki_int/issue/cert-manager-internal" {
                capabilities = ["update"]
              }
              path "pki_int/cert/ca" {
                capabilities = ["read"]
              }
              EOF
              vault policy write cert-manager-pki /tmp/cert-manager-pki.hcl

              if ! vault auth list -format=json | grep -q '"kubernetes/"'; then
                vault auth enable kubernetes
              fi

              vault write auth/kubernetes/config \
                kubernetes_host="https://kubernetes.default.svc:443" \
                kubernetes_ca_cert=@"${KUBE_CA_PATH}"

              vault write auth/kubernetes/role/cert-manager-pki \
                bound_service_account_names="cert-manager" \
                bound_service_account_namespaces="cert-manager" \
                policies="cert-manager-pki" \
                ttl="1h"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: vault-bootstrap
              mountPath: /vault/bootstrap
              readOnly: true
            - name: vault-tls
              mountPath: /vault/tls
              readOnly: true
      volumes:
        - name: vault-bootstrap
          secret:
            secretName: vault-unseal-keys
            items:
              - key: vault-root
                path: vault-root
        - name: vault-tls
          secret:
            secretName: vault-tls
