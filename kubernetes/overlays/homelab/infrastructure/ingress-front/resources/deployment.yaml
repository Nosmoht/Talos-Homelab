apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-front
  namespace: default
  labels:
    app.kubernetes.io/name: ingress-front
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/version: "1.27"
    app.kubernetes.io/component: l4-proxy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app.kubernetes.io/name: ingress-front
      app.kubernetes.io/instance: homelab
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingress-front
        app.kubernetes.io/instance: homelab
        app.kubernetes.io/version: "1.27"
        app.kubernetes.io/component: l4-proxy
        app.kubernetes.io/part-of: homelab
      annotations:
        k8s.v1.cni.cncf.io/networks: '[{"name": "homelab-gateway-macvlan", "mac": "02:42:c0:a8:02:46"}, {"name": "homelab-gateway-macvlan-public", "mac": "00:00:5e:00:01:63"}]'
        # Bumped to force Multus NAD re-read on pod roll (NADs do not hot-reload).
        kubectl.kubernetes.io/restartedAt: "2026-04-15T12:00:00Z"
    spec:
      tolerations:
        # Allow scheduling on nodes with the DRBD lost-quorum taint so
        # ingress-front survives storage-degraded events. The pod has no PVC
        # and does not depend on DRBD.
        - key: drbd.linbit.com/lost-quorum
          operator: Exists
          effect: NoSchedule
      initContainers:
        # Validate nginx config before the main container starts. Pod refuses
        # to start on syntax errors instead of crash-looping with a broken
        # config and taking LAN ingress down.
        - name: nginx-validate
          image: nginx:1.27-alpine
          command: ["nginx", "-t", "-c", "/etc/nginx/nginx.conf"]
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests: { cpu: 5m, memory: 16Mi }
            limits: { cpu: 100m, memory: 32Mi }
        # Force a DHCPv4 DISCOVER/OFFER/REQUEST/ACK exchange on net2 using the
        # pinned MAC so the Fritzbox populates its per-IP host entry
        # (GetSpecificHostEntryByIP.NewActive=True) and binds the IP<->MAC
        # mapping via real DHCP, not manual UI entry or ARP observation alone.
        # Without this, FRITZ!OS 8.20+ silently refuses to NAT inbound port
        # forwards to the pod. udhcpc uses -s /bin/true to skip interface
        # configuration (static IPAM already owns the address), so only
        # NET_RAW is needed - NET_ADMIN is forbidden by PSA baseline in the
        # default namespace.
        - name: net2-dhcp-register
          image: busybox:1.36
          command: ["sh", "-c", "udhcpc -s /bin/true -n -q -f -i net2 || echo 'dhcp probe failed, continuing'"]
          securityContext:
            capabilities:
              add: ["NET_RAW"]
              drop: ["ALL"]
            allowPrivilegeEscalation: false
          resources:
            requests: { cpu: 5m, memory: 8Mi }
            limits: { cpu: 50m, memory: 16Mi }
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          # No containerPorts / readinessProbe: nginx binds only on the macvlan
          # VIPs (net1/net2), not on the pod-network eth0 IP. A tcpSocket probe
          # would target eth0 and fail. The init container `nginx-validate`
          # already gates start on config syntax; verify VIP reachability from
          # outside the pod (LAN curl) post-deploy.
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: ingress-front-config
