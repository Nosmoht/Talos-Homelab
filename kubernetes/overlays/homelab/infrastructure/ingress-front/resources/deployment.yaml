apiVersion: v1
kind: ConfigMap
metadata:
  name: ingress-front-config
  namespace: default
  labels:
    app.kubernetes.io/name: ingress-front
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: l4-proxy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 512; }
    stream {
      # Gateway Envoy on same node's hostNetwork (bypasses TPROXY/L7 filter).
      # HOST_IP is the node's LAN IP, routed via eth0 (Cilium CNI) using
      # a /32 host route added at container start to bypass macvlan bridge
      # isolation on net1's 192.168.2.0/24 route.
      server {
        listen 192.168.2.70:80;
        proxy_pass HOST_IP_PLACEHOLDER:80;
      }
      server {
        listen 192.168.2.70:443;
        proxy_pass HOST_IP_PLACEHOLDER:443;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-front
  namespace: default
  labels:
    app.kubernetes.io/name: ingress-front
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/version: "1.27"
    app.kubernetes.io/component: l4-proxy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app.kubernetes.io/name: ingress-front
      app.kubernetes.io/instance: homelab
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingress-front
        app.kubernetes.io/instance: homelab
        app.kubernetes.io/version: "1.27"
        app.kubernetes.io/component: l4-proxy
        app.kubernetes.io/part-of: homelab
      annotations:
        k8s.v1.cni.cncf.io/networks: '[{"name": "homelab-gateway-macvlan", "mac": "02:42:c0:a8:02:46"}]'
    spec:
      nodeSelector:
        node-role.kubernetes.io/gateway: ""
      initContainers:
        - name: render-config
          image: busybox:1.37
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /config-template/nginx.conf /config/nginx.conf
              sed -i "s/HOST_IP_PLACEHOLDER/$HOST_IP/g" /config/nginx.conf
              echo "Rendered nginx.conf with HOST_IP=$HOST_IP"
              cat /config/nginx.conf
          volumeMounts:
            - name: config-template
              mountPath: /config-template/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: config-rendered
              mountPath: /config
          resources:
            requests:
              cpu: 10m
              memory: 8Mi
            limits:
              memory: 16Mi
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Add host route for node's LAN IP via eth0 (Cilium CNI).
              # Macvlan bridge mode blocks host<->pod on the same node via net1.
              ETH0_GW=$(ip route | awk '/^default/ {print $3}')
              ip route add "$HOST_IP/32" via "$ETH0_GW" dev eth0 2>/dev/null || true
              exec nginx -g 'daemon off;'
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          volumeMounts:
            - name: config-rendered
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
      volumes:
        - name: config-template
          configMap:
            name: ingress-front-config
        - name: config-rendered
          emptyDir: {}
