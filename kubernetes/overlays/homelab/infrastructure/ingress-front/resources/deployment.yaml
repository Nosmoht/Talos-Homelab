apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingress-front
  namespace: default
  labels:
    app.kubernetes.io/name: ingress-front
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/version: "1.27"
    app.kubernetes.io/component: l4-proxy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app.kubernetes.io/name: ingress-front
      app.kubernetes.io/instance: homelab
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ingress-front
        app.kubernetes.io/instance: homelab
        app.kubernetes.io/version: "1.27"
        app.kubernetes.io/component: l4-proxy
        app.kubernetes.io/part-of: homelab
      annotations:
        k8s.v1.cni.cncf.io/networks: '[{"name": "homelab-gateway-macvlan", "mac": "02:42:c0:a8:02:46"}, {"name": "homelab-gateway-macvlan-public", "mac": "02:42:c0:a8:02:47"}]'
    spec:
      tolerations:
        # Allow scheduling on nodes with the DRBD lost-quorum taint so
        # ingress-front survives storage-degraded events. The pod has no PVC
        # and does not depend on DRBD.
        - key: drbd.linbit.com/lost-quorum
          operator: Exists
          effect: NoSchedule
      initContainers:
        # Validate nginx config before the main container starts. Pod refuses
        # to start on syntax errors instead of crash-looping with a broken
        # config and taking LAN ingress down.
        - name: nginx-validate
          image: nginx:1.27-alpine
          command: ["nginx", "-t", "-c", "/etc/nginx/nginx.conf"]
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests: { cpu: 5m, memory: 16Mi }
            limits: { cpu: 100m, memory: 32Mi }
        # NOTE: ARP-flux suppression on net1/net2 (arp_ignore/arp_announce)
        # is NOT applied here. The default namespace enforces PodSecurity
        # baseline, which forbids NET_ADMIN — the cap an init container would
        # need to write to /proc/sys. The proper fix is to add the per-iface
        # arp_ignore/arp_announce sysctls to the kubelet's allowedUnsafeSysctls
        # list via Talos machine config, then declare them in pod
        # securityContext.sysctls. Tracked separately - the functional impact
        # is that the LAN/router may cache either VIP under the net1 MAC; the
        # data plane still works because both interfaces share one netns.
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          # No containerPorts / readinessProbe: nginx binds only on the macvlan
          # VIPs (net1/net2), not on the pod-network eth0 IP. A tcpSocket probe
          # would target eth0 and fail. The init container `nginx-validate`
          # already gates start on config syntax; verify VIP reachability from
          # outside the pod (LAN curl) post-deploy.
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: ingress-front-config
