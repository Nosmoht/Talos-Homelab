apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cnp-ingress-front
  namespace: default
  labels:
    app.kubernetes.io/name: ingress-front
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: ingress-front
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # toServices without toPorts: L3-only allow, no L7 proxy redirect.
    # Adding toPorts triggers L7 proxy interception which re-labels
    # traffic as reserved:ingress — denied by the Gateway's cilium.l7policy.
    - toServices:
        - k8sService:
            serviceName: cilium-gateway-homelab-gateway
            namespace: default
