replicaCount: 1
namespaceOverride: kube-system

nodeSelector:
  kubernetes.io/hostname: node-pi-01

tolerations:
  - key: homelab.io/pi-reserved
    operator: Equal
    value: "true"
    effect: NoSchedule

storageClass:
  create: true
  name: node-pi-01-local
  provisionerName: rancher.io/node-pi-01-local
  defaultClass: false
  defaultVolumeType: local
  reclaimPolicy: Delete
  volumeBindingMode: WaitForFirstConsumer
  allowedTopologies:
    - matchLabelExpressions:
        - key: kubernetes.io/hostname
          values:
            - node-pi-01

nodePathMap:
  - node: DEFAULT_PATH_FOR_NON_LISTED_NODES
    paths: []
  - node: node-pi-01
    paths:
      - /var/mnt/local-storage/local-path-provisioner

configmap:
  helperPod:
    tolerations:
      - key: homelab.io/pi-reserved
        operator: Equal
        value: "true"
        effect: NoSchedule
