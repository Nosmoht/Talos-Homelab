apiVersion: apps/v1
kind: Deployment
metadata:
  name: pi-public-ingress
  namespace: public-ingress
  labels:
    app.kubernetes.io/name: pi-public-ingress
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/version: "1.27"
    app.kubernetes.io/component: l4-proxy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app.kubernetes.io/name: pi-public-ingress
      app.kubernetes.io/instance: homelab
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pi-public-ingress
        app.kubernetes.io/instance: homelab
        app.kubernetes.io/version: "1.27"
        app.kubernetes.io/component: l4-proxy
        app.kubernetes.io/part-of: homelab
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Pin strictly to node-pi-01 — single-host WAN entrypoint.
      nodeSelector:
        kubernetes.io/hostname: node-pi-01
      # Tolerate the pi-reserved taint (other pods can't).
      tolerations:
        - key: homelab.io/pi-reserved
          operator: Equal
          value: "true"
          effect: NoSchedule
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 101        # nginx UID in nginx:1.27-alpine
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Gate start on config syntax; fail fast on bad nginx.conf
        # instead of crash-looping with port 443 unbound.
        - name: nginx-validate
          image: nginx:1.27-alpine
          command: ["nginx", "-t", "-c", "/etc/nginx/nginx.conf"]
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          resources:
            requests: { cpu: 5m, memory: 16Mi }
            limits: { cpu: 100m, memory: 32Mi }
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              # NET_BIND_SERVICE lets the non-root nginx bind <1024 without
              # relying on net.ipv4.ip_unprivileged_port_start tuning.
              add: [NET_BIND_SERVICE]
          ports:
            - name: https
              containerPort: 443
              hostPort: 443
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: pi-public-ingress-config
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
