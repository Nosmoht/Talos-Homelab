apiVersion: apps/v1
kind: Deployment
metadata:
  name: pi-public-ingress
  namespace: public-ingress
  labels:
    app.kubernetes.io/name: pi-public-ingress
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/version: "1.27"
    app.kubernetes.io/component: l4-proxy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      app.kubernetes.io/name: pi-public-ingress
      app.kubernetes.io/instance: homelab
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pi-public-ingress
        app.kubernetes.io/instance: homelab
        app.kubernetes.io/version: "1.27"
        app.kubernetes.io/component: l4-proxy
        app.kubernetes.io/part-of: homelab
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Pin strictly to node-pi-01 — single-host WAN entrypoint.
      nodeSelector:
        kubernetes.io/hostname: node-pi-01
      # Tolerate the pi-reserved taint (other pods can't).
      tolerations:
        - key: homelab.io/pi-reserved
          operator: Equal
          value: "true"
          effect: NoSchedule
      terminationGracePeriodSeconds: 10
      securityContext:
        # nginx:1.27-alpine master runs as root to bind :443 then forks
        # workers that drop to the nginx (uid 101) user. Forcing
        # runAsNonRoot here makes the master start as uid 101, which
        # then fails to bind :443 because NET_BIND_SERVICE does not
        # propagate to non-root processes on Alpine without file caps.
        # The namespace is PSA=privileged which permits root.
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          securityContext:
            readOnlyRootFilesystem: true
            # master runs as root to bind :443, forks workers as nginx user.
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
              add: [NET_BIND_SERVICE, CHOWN, SETUID, SETGID, DAC_OVERRIDE]
          ports:
            - name: https
              containerPort: 443
              hostPort: 443
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 64Mi
      volumes:
        - name: config
          configMap:
            name: pi-public-ingress-config
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
