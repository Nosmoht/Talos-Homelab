apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infrastructure
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: project
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  description: Cluster infrastructure components
  sourceRepos:
    - https://github.com/Nosmoht/Talos-Homelab.git
    - https://argoproj.github.io/argo-helm
    - https://charts.jetstack.io
    - https://github.com/alex1989hu/kubelet-serving-cert-approver.git
    - https://charts.dexidp.io
    - https://kubernetes-sigs.github.io/metrics-server
    - https://kubernetes-sigs.github.io/node-feature-discovery/charts
    - https://nvidia.github.io/k8s-device-plugin
    - ghcr.io/piraeusdatastore/piraeus-operator*
    - https://cloudnative-pg.github.io/charts
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: cert-manager
      server: https://kubernetes.default.svc
    - namespace: default
      server: https://kubernetes.default.svc
    - namespace: dex
      server: https://kubernetes.default.svc
    - namespace: kubelet-serving-cert-approver
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
    - namespace: node-feature-discovery
      server: https://kubernetes.default.svc
    - namespace: cnpg-system
      server: https://kubernetes.default.svc
    - namespace: piraeus-datastore
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: apiregistration.k8s.io
      kind: APIService
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: scheduling.k8s.io
      kind: PriorityClass
    - group: storage.k8s.io
      kind: StorageClass
    - group: cert-manager.io
      kind: ClusterIssuer
    - group: gateway.networking.k8s.io
      kind: GatewayClass
    - group: nfd.k8s-sigs.io
      kind: NodeFeatureRule
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
